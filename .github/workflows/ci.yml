name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --package-lock-only --package-lock --legacy-peer-deps
      - run: npm ci --legacy-peer-deps
      - run: npm test
